# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Main
on:
  push:
  pull_request:
    branches:
      - "*"

env:
  DOTNET_VERSION: 8.x
  NUGET_DIR: ${{github.workspace}}/nuget

jobs:
  versioning:
    name: Versioning
    runs-on: ubuntu-latest
    outputs:
      FullSemVer: ${{ steps.versioning.outputs.FullSemVer }} # Job output
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history to allow automatic versioning

      - name: Determine version
        uses: ./.github/actions/versioning
        id: versioning
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}

      - name: Print version
        run: "echo 'FullSemVer: ${{steps.versioning.outputs.FullSemVer}}'"
        shell: bash

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history to allow automatic versioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}
          #cache: true

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: "**/bin/"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history to allow automatic versioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}
          #cache: true

      - name: Run tests
        run: dotnet test --no-build --verbosity normal

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults
        if: ${{always()}}

  pack:
    name: Pack (NuGet)
    runs-on: ubuntu-latest
    needs: [versioning, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Get all history to allow automatic versioning

      - name: Create NuGet
        uses: ./.github/actions/pack-nuget
        with:
          dotnet-version: ${{env.DOTNET_VERSION}}
          nuget-dir: ${{env.NUGET_DIR}}
          FullSemVer: ${{needs.versioning.outputs.FullSemVer}}"
